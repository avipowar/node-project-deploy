name: traefik

services:
  traefik:
    image: traefik:latest

    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.traefik.address=:8000"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.cert-resolver.acme.httpchallenge=true"
      - "--certificatesresolvers.cert-resolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.cert-resolver.acme.email=powaravinash06@gmail.com"
      - "--certificatesresolvers.cert-resolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./certificates:/letsencrypt"

    ports:
      - "80:80"
      - "443:443"

    networks:
      - traefik

networks:
  traefik:
